modelServerPods:
  # Apply JSON patches to model server Pods so model caches are backed by PVC.
  jsonPatches:
    - op: add
      path: /spec/volumes/-
      value:
        name: hf-cache
        persistentVolumeClaim:
          claimName: kubeai-hf-cache
    - op: add
      path: /spec/containers/0/volumeMounts/-
      value:
        name: hf-cache
        mountPath: /root/.cache/huggingface
    - op: add
      path: /spec/volumes/-
      value:
        name: ollama-cache
        persistentVolumeClaim:
          claimName: kubeai-ollama-cache
    - op: add
      path: /spec/containers/0/volumeMounts/-
      value:
        name: ollama-cache
        mountPath: /root/.ollama

modelServerPersistentCache:
  enabled: true
  storageClassName: ""
  accessModes:
    - ReadWriteOnce
  hf:
    claimName: kubeai-hf-cache
    size: 150Gi
  ollama:
    claimName: kubeai-ollama-cache
    size: 150Gi

cacheProfiles:
  model-cache-150gb:
    sharedFilesystem:
      size: "150Gi"
