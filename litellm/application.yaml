apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: ghcr.io/berriai
      chart: litellm-helm
      targetRevision: 1.82.3
      helm:
        parameters:
          - name: image.repository
            value: ghcr.io/berriai/litellm-database
          - name: image.tag
            value: main-latest
          - name: postgresql.image.tag
            value: latest
        valueFiles:
          - $values/litellm/values.yaml
    - repoURL: https://github.com/bahn1075/kubeai-cicd.git
      targetRevision: desktop
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
